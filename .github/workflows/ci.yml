name: CI

on:
  push:
    branches: [ main, master, feature/**, fix/** ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -j 2

      - name: Run tests (xvfb)
        run: |
          sudo apt-get install -y xvfb
          xvfb-run -a ctest --test-dir build -j 2 --output-on-failure

  build-test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -j 3

      - name: Run tests
        run: ctest --test-dir build -j 2 --output-on-failure

