name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y xorg-dev libwayland-dev wayland-protocols libxkbcommon-dev ninja-build
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G Ninja
      - name: Build
        run: cmake --build build --config Release --target vulkano_app
      - name: Build tests
        run: cmake --build build --config Release --target vulkano_tests
      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure
