name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, windows-latest]
        build_type: [Debug]
    env:
      CMAKE_BUILD_TYPE: ${{ matrix.build_type }}
      VK_APP_AUTOCLOSE_MS: "800"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Vulkan headers + loader + tools (glslangValidator)
          sudo apt-get install -y --no-install-recommends \ 
            cmake ninja-build build-essential \ 
            libvulkan-dev vulkan-tools glslang-tools \ 
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \ 
            clang-format

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja vulkan-sdk glslang clang-format || true

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install -y ninja
          choco install -y vulkan-sdk
          choco install -y llvm

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build -j

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config $env:CMAKE_BUILD_TYPE -j

      - name: clang-format check
        if: always()
        shell: bash
        run: |
          if command -v clang-format >/dev/null 2>&1; then \
            git ls-files '*.hpp' '*.cpp' | xargs -I{} clang-format --dry-run --Werror {}; \
          else \
            echo "clang-format not available; skipping"; \
          fi

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a ctest --test-dir build --output-on-failure

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: ctest --test-dir build --output-on-failure

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build -C $env:CMAKE_BUILD_TYPE --output-on-failure

